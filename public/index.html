<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Code Explainer</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>🤖 AI Code Explainer</h1>

        <div class="controls">

            <select id="language">

                <option value="Auto Detect">🤖 Auto Detect</option>
                <option value="Python">🐍 Python</option>
                <option value="Java">☕ Java</option>
                <option value="C++">💻 C++</option>
                <option value="JavaScript">🟨 JavaScript</option>
                <option value="TypeScript">🔷 TypeScript</option>
                <option value="Go">🐹 Go</option>
                <option value="Rust">🦀 Rust</option>
                <option value="PHP">🐘 PHP</option>
                <option value="Ruby">💎 Ruby</option>
                <option value="Swift">🍎 Swift</option>
                <option value="Kotlin">📱 Kotlin</option>
                <option value="SQL">🗄 SQL</option>
                <option value="HTML">🌐 HTML</option>
                <option value="CSS">🎨 CSS</option>

            </select>

        </div>

        <textarea id="code" placeholder="Paste your code here..."></textarea>

        <div class="buttons">

            <button id="explainBtn">🚀 Explain Code</button>

            <button id="optimizeBtn">✨ Optimize Code</button>

        </div>

        <div id="loading">

            🤖 Reading code...

        </div>

        <div class="card">

            <h2>📄 Explanation</h2>

            <div id="result"></div>

        </div>

        <div class="card">

            <h2>✨ Optimized Code</h2>

            <pre id="optimizedResult"></pre>

        </div>

        <div class="actions">

            <button id="copyBtn">📋 Copy</button>

            <button id="downloadBtn">⬇ Download</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
